<title>Αρχείο — STOA</title>
<style>
.archive-header{border-bottom:1px solid var(--ink);display:flex;align-items:center;justify-content:space-between;padding:18px 5vw;font-size:11px;font-weight:800;letter-spacing:.1em}.archive-header a:first-child{font-family:var(--serif);font-size:35px;letter-spacing:-.05em}.archive-shell{width:min(1450px,calc(100% - 48px));margin:auto}.archive-hero{padding:80px 0 45px}.archive-hero p{text-transform:uppercase;letter-spacing:.13em;font-size:10px;font-weight:900}.archive-hero h1{font-family:var(--serif);font-size:clamp(90px,16vw,240px);font-weight:500;line-height:.7;letter-spacing:-.08em;margin:35px 0}.filters{border-block:1px solid var(--ink);display:flex;gap:9px;overflow:auto;padding:14px 0}.filters button{background:transparent;border:1px solid var(--ink);border-radius:100px;padding:9px 15px;white-space:nowrap;cursor:pointer;font-size:10px;font-weight:800}.filters button.active{background:var(--ink);color:var(--paper)}.archive-grid{display:grid;grid-template-columns:repeat(3,1fr);border-left:1px solid var(--ink)}.archive-card{border-right:1px solid var(--ink);border-bottom:1px solid var(--ink);padding:22px;cursor:pointer;min-height:560px}.archive-card img{width:100%;aspect-ratio:4/3;object-fit:cover;filter:grayscale(1);transition:.25s}.archive-card:hover img{filter:none}.archive-card .meta{text-transform:uppercase;letter-spacing:.1em;font-size:9px;font-weight:900;margin:18px 0}.archive-card h2{font-family:var(--serif);font-size:clamp(31px,3vw,48px);font-weight:500;line-height:.96;letter-spacing:-.04em;margin:0 0 14px}.archive-card p{font-family:var(--serif);font-size:16px;line-height:1.35}.archive-empty{padding:80px 0;font-family:var(--serif);font-size:28px}@media(max-width:950px){.archive-grid{grid-template-columns:1fr 1fr}}@media(max-width:620px){.archive-shell{width:calc(100% - 24px)}.archive-hero h1{font-size:30vw}.archive-grid{grid-template-columns:1fr}.archive-card{min-height:0}}
</style></head><body>
<header class="archive-header"><a href="index.html">STOA</a><span>ΑΡΧΕΙΟ ΙΣΤΟΡΙΩΝ</span></header>
<main class="archive-shell"><section class="archive-hero"><p>Η ΠΟΛΗ, ΑΠΟ ΜΕΣΑ.</p><h1>ΑΡΧΕΙΟ</h1></section><div class="filters" id="filters"></div><section class="archive-grid" id="grid"><div class="archive-empty">Φόρτωση ιστοριών…</div></section></main>
<script>
let allArticles = [];
const render = category => {
  document.querySelectorAll('.filters button').forEach(button => button.classList.toggle('active', button.dataset.category === category));
  const items = category === 'Όλα' ? allArticles : allArticles.filter(item => item.category === category);
  document.getElementById('grid').innerHTML = items.length ? items.map(item => '<article class="archive-card" data-slug="' + item.slug + '"><img src="' + item.image + '" alt=""><p class="meta">' + item.category + ' · ' + item.read + '</p><h2>' + item.title + '</h2><p>' + item.dek + '</p></article>').join('') : '<div class="archive-empty">Δεν υπάρχουν ακόμη άρθρα σε αυτή την κατηγορία.</div>';
  document.querySelectorAll('.archive-card').forEach(card => card.addEventListener('click', () => location.href = 'article.html?slug=' + encodeURIComponent(card.dataset.slug)));
};
fetch('articles.json?v=' + Date.now()).then(response => response.json()).then(items => {
  allArticles = items.filter(item => item.published).sort((a,b) => String(b.date).localeCompare(String(a.date)));
  const categories = ['Όλα', ...new Set(allArticles.map(item => item.category))];
  document.getElementById('filters').innerHTML = categories.map(category => '<button data-category="' + category + '">' + category + '</button>').join('');
  document.querySelectorAll('.filters button').forEach(button => button.addEventListener('click', () => render(button.dataset.category)));
  render('Όλα');
}).catch(() => document.getElementById('grid').innerHTML = '<div class="archive-empty">Δεν ήταν δυνατή η φόρτωση των άρθρων.</div>');
</script></body></html>
